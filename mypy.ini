[mypy]
# Static type checker config (задача 5.6 — 0.2.1u).
# Запуск: mypy . (или mypy <file.py> для одного файла).
#
# Permissive baseline — не требуем 100% покрытия типами для legacy-кода.
# Постепенно ужесточим (disallow_untyped_defs, strict_optional) как только
# чисто пройдёт текущий уровень.

python_version = 3.13

# Базовые проверки.
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True

# Внешние библиотеки без stubs (gspread, colorama) — игнорируем.
# Если позже захочется stricter — снять и поставить types-gspread / types-colorama.
ignore_missing_imports = True

# Untyped функции пропускаем (после 5.1 их почти нет, но legacy-куски могут
# вылезти). При strict-режиме поменять на True.
disallow_untyped_defs = False

# Структура dict-based items (state.inventory, state.equipment.<slot>) пока
# не TypedDict — таблично-плоский dict со списками. Не строжим. Снимется
# после задачи 1.6 (Items as dataclass).
strict_optional = False

# Per-module overrides для шумных файлов можно добавлять как:
# [mypy-some_module]
# ignore_errors = True
